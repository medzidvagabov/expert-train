<style>
:root{--grad:linear-gradient(135deg,#2563EB,#7C3AED);--shadow:0 4px 24px rgba(0,0,0,0.06);--shadow-lg:0 8px 40px rgba(0,0,0,0.1)}
*{scrollbar-width:thin;scrollbar-color:#CBD5E1 transparent}
body{font-family:'Manrope',sans-serif;background:#F8FAFC;color:#1E293B;overflow-x:hidden}
.grad-text{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.grad-bg{background:var(--grad)}
.grad-border{border:2px solid transparent;background-clip:padding-box;position:relative}
.grad-border::before{content:'';position:absolute;inset:-2px;border-radius:inherit;background:var(--grad);z-index:-1}
.card{background:#fff;border-radius:16px;box-shadow:var(--shadow);transition:all .3s ease}
.card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.btn-grad{background:var(--grad);color:#fff;border:none;border-radius:12px;padding:12px 28px;font-weight:600;cursor:pointer;transition:all .3s;font-size:15px}
.btn-grad:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 8px 24px rgba(37,99,235,.35)}
.btn-outline{border:2px solid #2563EB;color:#2563EB;background:transparent;border-radius:12px;padding:10px 24px;font-weight:600;cursor:pointer;transition:all .3s;font-size:15px}
.btn-outline:hover{background:#2563EB;color:#fff}
.sidebar{width:280px;min-height:100vh;background:#fff;border-right:1px solid #E2E8F0;position:fixed;left:0;top:0;z-index:40;transition:transform .3s ease}
.sidebar.collapsed{transform:translateX(-100%)}
.sidebar-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:35;opacity:0;pointer-events:none;transition:opacity .3s}
.sidebar-backdrop.active{opacity:1;pointer-events:auto}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 20px;margin:2px 12px;border-radius:12px;cursor:pointer;transition:all .2s;color:#64748B;font-weight:500;font-size:14.5px}
.nav-item:hover{background:#F1F5F9;color:#1E293B}
.nav-item.active{background:linear-gradient(135deg,rgba(37,99,235,.1),rgba(124,58,237,.1));color:#2563EB;font-weight:600}
.nav-item.active i{color:#2563EB}
.main-content{margin-left:280px;min-height:100vh;transition:margin .3s}
.main-content.full{margin-left:0}
.input-field{width:100%;padding:11px 16px;border:2px solid #E2E8F0;border-radius:12px;font-family:inherit;font-size:14.5px;transition:all .2s;outline:none;background:#fff;box-sizing:border-box}
.input-field:focus{border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.table-row{transition:background .15s}
.table-row:hover{background:#F8FAFC}
.toast{position:fixed;top:24px;right:24px;padding:14px 24px;border-radius:12px;color:#fff;font-weight:500;font-size:14.5px;z-index:9999;animation:slideIn .4s ease;box-shadow:0 8px 32px rgba(0,0,0,.15);display:flex;align-items:center;gap:10px;max-width:calc(100% - 48px)}
.toast.success{background:#059669}.toast.error{background:#DC2626}.toast.info{background:#2563EB}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(120%);opacity:0}}
@keyframes fadeUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-grad{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-up{animation:fadeUp .6s ease both}
.fade-up-d1{animation-delay:.1s}.fade-up-d2{animation-delay:.2s}.fade-up-d3{animation-delay:.3s}.fade-up-d4{animation-delay:.4s}
.heatmap-cell{width:100%;aspect-ratio:1.4;border-radius:8px;transition:all .2s;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff}
.heatmap-cell:hover{transform:scale(1.08);z-index:2;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.schedule-cell{border-radius:10px;padding:8px 10px;font-size:12px;cursor:pointer;transition:all .2s;border:2px solid transparent;min-height:60px}
.schedule-cell:hover{transform:scale(1.02);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.schedule-cell.conflict{border-color:#DC2626!important;box-shadow:0 0 0 2px rgba(220,38,38,.2)}
.schedule-cell.type-lecture{background:#EFF6FF;border-left:4px solid #2563EB}
.schedule-cell.type-practice{background:#F0FDF4;border-left:4px solid #16A34A}
.schedule-cell.type-lab{background:#FFFBEB;border-left:4px solid #D97706}
.tooltip-custom{position:absolute;background:#1E293B;color:#fff;padding:8px 14px;border-radius:8px;font-size:12px;pointer-events:none;z-index:100;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s;padding:16px}
.modal-box{background:#fff;border-radius:20px;padding:24px;max-width:540px;width:100%;box-shadow:var(--shadow-lg);animation:fadeUp .3s ease;max-height:90vh;overflow-y:auto}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.progress-ring{transform:rotate(-90deg)}
.drop-zone{border:2px dashed #CBD5E1;border-radius:16px;padding:24px;text-align:center;transition:all .3s;cursor:pointer}
.drop-zone:hover,.drop-zone.dragover{border-color:#2563EB;background:rgba(37,99,235,.04)}
.slider-custom{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;background:#E2E8F0;outline:none}
.slider-custom::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--grad);cursor:pointer;box-shadow:0 2px 8px rgba(37,99,235,.3)}
.tab-btn{padding:10px 16px;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;border:none;background:transparent;color:#64748B;white-space: nowrap}
.tab-btn.active{background:var(--grad);color:#fff}
.tab-btn:hover:not(.active){background:#F1F5F9;color:#1E293B}
.status-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;white-space: nowrap}
.status-green{background:#DCFCE7;color:#166534}.status-orange{background:#FFF7ED;color:#9A3412}.status-red{background:#FEE2E2;color:#991B1B}
.hero-bg{background:linear-gradient(135deg,rgba(37,99,235,.04) 0%,rgba(124,58,237,.04) 50%,rgba(37,99,235,.02) 100%)}
.hero-pattern{background-image:radial-gradient(circle at 1px 1px,rgba(37,99,235,.06) 1px,transparent 0);background-size:32px 32px}
.gen-overlay{position:fixed;inset:0;background:rgba(255,255,255,.92);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding: 20px; text-align: center}
.gen-spinner{width:56px;height:56px;border:4px solid #E2E8F0;border-top-color:#2563EB;border-radius:50%;animation:spin .8s linear infinite}

  }
  .sidebar.collapsed {

function animateCounters(){
  $$('.counter-anim').forEach(el=>{
    const target=parseFloat(el.dataset.target);
    const suffix=el.dataset.suffix||'';const prefix=el.dataset.prefix||'';
    let current=0;const step=target/40;
    const timer=setInterval(()=>{current+=step;if(current>=target){current=target;clearInterval(timer)}el.textContent=prefix+Math.round(current)+suffix;},30);
  });
}

function generateSchedule(){
  DB.events=[];let eventId=1;const allSlots=[];
  for(let d=0;d<6;d++) for(let s=0;s<6;s++) allSlots.push({day:d,slot:s+1});
  DB.groupDisciplines.forEach(gd=>{
    const disc=getDisc(gd.disciplineId);const teacher=getTeacher(disc.teacherId);
    if(!disc||!teacher) return;
    const pairsPerWeek=Math.max(1,Math.round(disc.hours/17));let assigned=0;
    const shuffled=[...allSlots].sort(()=>Math.random()-0.5);
    for(const sl of shuffled){
      if(assigned>=pairsPerWeek) break;
      if(teacher.restrictions.includes(sl.slot)) continue;
      if(DB.events.find(e=>e.teacherId===teacher.id&&e.day===sl.day&&e.slot===sl.slot)) continue;
      if(DB.events.find(e=>e.groupId===gd.groupId&&e.day===sl.day&&e.slot===sl.slot)) continue;
      const group=getGroup(gd.groupId);let room=null;
      const candidates=DB.rooms.filter(r=>r.capacity>=group.students);
      const typeMatch=candidates.filter(r=>{if(disc.type==='lecture') return r.type==='lecture';if(disc.type==='lab') return r.type==='lab'||r.type==='computer';return true;});
      const pool=typeMatch.length?typeMatch:candidates;
      room=pool.find(r=>!DB.events.find(e=>e.roomId===r.id&&e.day===sl.day&&e.slot===sl.slot));
      const conflict=!room;if(!room) room=DB.rooms[Math.floor(Math.random()*DB.rooms.length)];
      DB.events.push({id:eventId++,day:sl.day,slot:sl.slot,roomId:room.id,teacherId:teacher.id,groupId:gd.groupId,disciplineId:disc.id,type:disc.type,conflict,held:false});
      assigned++;
    }
  });
  State.scheduleGenerated=true;
}
generateSchedule();

      <div class="card p-5 sm:p-6 fade-up fade-up-d2"><div class="flex items-center justify-between mb-4"><div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:${conflictEvents?'#FEE2E2':'#F0FDF4'}"><i class="fas ${conflictEvents?'fa-exclamation-triangle text-red-500':'fa-check-circle text-green-600'}"></i></div><span class="status-badge ${conflictEvents?'status-red':'status-green'}">${conflictEvents?'Есть':'Нет'}</span></div><div class="text-2xl font-800">${conflictEvents}</div><div class="text-sm text-gray-500">Конфликтов</div></div>
      <div class="card p-5 sm:p-6 fade-up fade-up-d3"><div class="flex items-center justify-between mb-4"><div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:#FFF7ED"><i class="fas fa-door-open text-orange-500"></i></div><span class="text-xs text-orange-500 font-600">${usedRooms}/${DB.rooms.length}</span></div><div class="text-2xl font-800">${DB.rooms.length}</div><div class="text-sm text-gray-500">Аудиторий всего</div></div>
    </div>
    <div class="card p-5 sm:p-6 fade-up fade-up-d2">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-5">
        <h3 class="text-lg font-700">Тепловая карта корпусов</h3>
        <div class="flex gap-2 flex-wrap" id="heatmapTabs">${DB.buildings.map(b=>`<button class="tab-btn ${State.heatmapBuilding===b.id?'active':''}" onclick="State.heatmapBuilding=${b.id};State.heatmapFloor=1;refreshDashboard()">${b.name}</button>`).join('')}</div>
      </div>
      <div class="flex gap-2 mb-4 flex-wrap" id="floorTabs">${[1,2,3,4,5].map(f=>`<button class="tab-btn text-xs ${State.heatmapFloor===f?'active':''}" onclick="State.heatmapFloor=${f};refreshDashboard()" style="padding:6px 14px">Этаж ${f}</button>`).join('')}</div>
      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3" id="heatmapGrid"></div>
      <div class="flex items-center gap-4 mt-4 text-xs text-gray-500 flex-wrap"><span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded" style="background:#22C55E"></span>Свободна</span><span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded" style="background:#F59E0B"></span>Средняя</span><span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded" style="background:#EF4444"></span>Загружена</span><span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded" style="background:#94A3B8"></span>Не используется</span></div>
    </div>

function refreshDashboard(){const pc=$('#pageContent');if(pc)pc.innerHTML=renderDashboard();setTimeout(()=>buildHeatmap(),30);}
function buildHeatmap(){const grid=$('#heatmapGrid');if(!grid)return;const rooms=roomsByBuilding(State.heatmapBuilding,State.heatmapFloor);grid.innerHTML=rooms.map(r=>{const events=DB.events.filter(e=>e.roomId===r.id);const load=Math.round((events.length/6)*100);let bg='#94A3B8';if(events.length>0){if(load<=40)bg='#22C55E';else if(load<=70)bg='#F59E0B';else bg='#EF4444'}return `<div class="heatmap-cell" style="background:${bg}" title="${r.name}: ${events.length}/6 пар (${load}%)">${r.name}</div>`;}).join('');}
function initDashboard(){buildHeatmap()}

/* ========== КОНСТРУКТОР РАСПИСАНИЯ ========== */
function renderSchedule(){
  const files=State.uploadedFiles;
  return `<div class="space-y-6">
    <div class="card p-5 sm:p-6 fade-up"><h3 class="text-lg font-700 mb-4">Загрузка данных</h3>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">${[{key:'plans',label:'Учебные планы',icon:'fa-file-alt',hint:'Формат: .xlsx, .csv'},{key:'rooms',label:'Аудитории',icon:'fa-building',hint:'Формат: .xlsx, .csv'},{key:'restrictions',label:'Ограничения',icon:'fa-user-shield',hint:'Формат: .xlsx, .csv'}].map(f=>`
        <div class="drop-zone ${files[f.key]?'border-green-400 bg-green-50':''}" id="drop-${f.key}" onclick="document.getElementById('file-${f.key}').click()" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="handleDrop(event,'${f.key}')">
          <input type="file" id="file-${f.key}" class="hidden" accept=".xlsx,.csv" onchange="handleFile(this,'${f.key}')">
          ${files[f.key]?`<div class="text-green-600 text-3xl mb-2"><i class="fas fa-check-circle"></i></div><div class="font-600 text-green-700 text-sm">${files[f.key]}</div>`:`<div class="text-gray-400 text-3xl mb-2"><i class="fas ${f.icon}"></i></div><div class="font-600 text-sm mb-1">${f.label}</div><div class="text-xs text-gray-400">${f.hint}</div><div class="text-xs text-gray-400 mt-2">Перетащите или нажмите</div>`}
        </div>`).join('')}
      </div>
    </div>
    <div class="card p-5 sm:p-6 fade-up fade-up-d1">
      <h3 class="text-lg font-700 mb-5">Настройки алгоритма генерации</h3>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">${[{key:'balance',label:'Балансировка нагрузки',desc:'Равномерное распределение пар по дням'},{key:'compactness',label:'Компактность',desc:'Минимизация окон между парами'},{key:'gaps',label:'Минимизация разрывов',desc:'Сокращение пустых слотов в аудиториях'}].map(s=>`
        <div><div class="flex justify-between mb-1"><span class="font-600 text-sm">${s.label}</span><span class="text-sm text-primary font-700" id="val-${s.key}">${State.algoSettings[s.key]}%</span></div><p class="text-xs text-gray-400 mb-3">${s.desc}</p><input type="range" class="slider-custom" min="0" max="100" value="${State.algoSettings[s.key]}" oninput="State.algoSettings['${s.key}']=+this.value;document.getElementById('val-${s.key}').textContent=this.value+'%'"></div>`).join('')}
      </div>
      <div class="mt-6 flex flex-col sm:flex-row gap-3 sm:items-center"><button class="btn-grad" onclick="runGeneration()"><i class="fas fa-magic mr-2"></i>Сгенерировать расписание</button><span class="text-sm text-gray-400" id="genStatus">${State.scheduleGenerated?'Расписание сгенерировано':'Данные не сгенерированы'}</span></div>
    </div>
    <div class="card p-5 sm:p-6 fade-up fade-up-d2">
      <div class="flex flex-col gap-4 mb-5">
        <h3 class="text-lg font-700">Расписание</h3>
        <div class="flex flex-wrap gap-2">
          <select class="input-field !w-full sm:!w-auto" style="padding:8px 14px;font-size:13px" id="scheduleViewType" onchange="State.scheduleFilter=this.value;refreshSchedule()"><option value="group" ${State.scheduleFilter==='group'?'selected':''}>По группам</option><option value="teacher" ${State.scheduleFilter==='teacher'?'selected':''}>По преподавателям</option><option value="room" ${State.scheduleFilter==='room'?'selected':''}>По аудиториям</option></select>
          <select class="input-field !w-full sm:!w-auto" style="padding:8px 14px;font-size:13px" id="scheduleViewId" onchange="State.scheduleFilterId=+this.value;refreshSchedule()">${getScheduleOptions()}</select>
          <button class="btn-outline text-sm !px-4 whitespace-nowrap" onclick="toast('Расписание экспортировано в Excel','success')"><i class="fas fa-file-excel mr-1"></i>Экспорт</button>
          <button class="btn-grad text-sm !px-4 whitespace-nowrap" onclick="toast('Расписание утверждено','success')"><i class="fas fa-check mr-1"></i>Утвердить</button>
        </div>
      </div>
      <div class="overflow-x-auto -mx-4 sm:mx-0"><table class="w-full text-sm" style="min-width:800px"><thead><tr class="text-left text-gray-400 border-b border-gray-100"><th class="pb-3 font-600 w-32 pl-4 sm:pl-0">Время</th>${DAYS.map(d=>`<th class="pb-3 font-600 text-center">${d}</th>`).join('')}</tr></thead><tbody id="scheduleBody">${buildScheduleRows()}</tbody></table></div>
    </div>
  </div><div id="scheduleSidePanel"></div>`;
}
function getScheduleOptions(){if(State.scheduleFilter==='group') return DB.groups.map(g=>`<option value="${g.id}" ${State.scheduleFilterId===g.id?'selected':''}>${g.name}</option>`).join('');if(State.scheduleFilter==='teacher') return DB.teachers.map(t=>`<option value="${t.id}" ${State.scheduleFilterId===t.id?'selected':''}>${t.name.split(' ').slice(0,2).join(' ')}</option>`).join('');return DB.rooms.map(r=>`<option value="${r.id}" ${State.scheduleFilterId===r.id?'selected':''}>${r.name}</option>`).join('');}
function buildScheduleRows(){return SLOTS.map(sl=>{const cells=DAYS.map((_,di)=>{const ev=DB.events.find(e=>{if(State.scheduleFilter==='group') return e.groupId===State.scheduleFilterId&&e.day===di&&e.slot===sl.id;if(State.scheduleFilter==='teacher') return e.teacherId===State.scheduleFilterId&&e.day===di&&e.slot===sl.id;return e.roomId===State.scheduleFilterId&&e.day===di&&e.slot===sl.id;});if(!ev) return `<td class="py-1 px-1"><div class="schedule-cell bg-gray-50 text-gray-300 text-center" style="min-height:60px;border-left:4px solid transparent">—</div></td>`;const disc=getDisc(ev.disciplineId),grp=getGroup(ev.groupId),tch=getTeacher(ev.teacherId),rm=getRoom(ev.roomId);let info='';if(State.scheduleFilter==='group') info=`${rm?.name||''}<br><span class="text-gray-500">${tch?.name?.split(' ')[0]||''}</span>`;else if(State.scheduleFilter==='teacher') info=`${grp?.name||''}<br><span class="text-gray-500">${rm?.name||''}</span>`;else info=`${grp?.name||''}<br><span class="text-gray-500">${tch?.name?.split(' ')[0]||''}</span>`;return `<td class="py-1 px-1"><div class="schedule-cell ${TYPE_COLOR[ev.type]||''} ${ev.conflict?'conflict':''}" onclick="openEventPanel(${ev.id})"><div class="font-600 text-xs leading-tight mb-0.5">${disc?.name||'—'}</div><div class="text-xs leading-tight opacity-80">${info}</div><div class="text-xs mt-1 opacity-60">${TYPE_MAP[ev.type]||''}</div>${ev.held?'<div class="text-xs text-green-600 mt-0.5"><i class="fas fa-check"></i> Проведено</div>':''}</div></td>`;}).join('');return `<tr class="border-b border-gray-50"><td class="py-1 pr-3 font-600 text-xs text-gray-500 whitespace-nowrap align-top pt-3 pl-4 sm:pl-0">${sl.time}</td>${cells}</tr>`;}).join('');}
function refreshSchedule(){const pc=$('#pageContent');if(!pc)return;pc.innerHTML=renderSchedule();}

function openEventPanel(evId){const ev=DB.events.find(e=>e.id===evId);if(!ev)return;const disc=getDisc(ev.disciplineId),grp=getGroup(ev.groupId),tch=getTeacher(ev.teacherId),rm=getRoom(ev.roomId);showModal(`<div class="flex items-center justify-between mb-6"><h3 class="text-lg font-800">${disc?.name}</h3><button onclick="closeModal()" class="w-8 h-8 rounded-lg hover:bg-gray-100 flex items-center justify-center"><i class="fas fa-times text-gray-400"></i></button></div><div class="space-y-3 text-sm"><div class="flex justify-between"><span class="text-gray-500">Тип</span><span class="font-600">${TYPE_MAP[ev.type]}</span></div><div class="flex justify-between"><span class="text-gray-500">День / Время</span><span class="font-600 text-right ml-2">${DAYS[ev.day]}, ${SLOTS[ev.slot-1].time}</span></div><div class="flex justify-between"><span class="text-gray-500">Группа</span><span class="font-600">${grp?.name}</span></div><div class="flex justify-between"><span class="text-gray-500">Преподаватель</span><span class="font-600 text-right ml-2">${tch?.name}</span></div><div class="flex justify-between"><span class="text-gray-500">Аудитория</span><span class="font-600">${rm?.name} (${rm?.capacity} мест)</span></div><div class="flex justify-between items-center"><span class="text-gray-500">Статус</span><span class="status-badge ${ev.conflict?'status-red':'status-green'}">${ev.conflict?'Конфликт':'Норма'}</span></div></div><div class="mt-6 space-y-3"><div><label class="block text-sm font-600 mb-1.5">Перенести в аудиторию</label><select class="input-field" id="moveRoomSelect">${DB.rooms.filter(r=>r.id!==ev.roomId).map(r=>`<option value="${r.id}">${r.name} (${r.capacity} мест)</option>`).join('')}</select></div><div class="flex gap-3"><button class="btn-grad flex-1 text-sm" onclick="moveEvent(${ev.id})"><i class="fas fa-exchange-alt mr-1"></i>Перенести</button><button class="btn-outline flex-1 text-sm" onclick="toggleHeld(${ev.id})" style="${ev.held?'border-color:#059669;color:#059669':''}"><i class="fas fa-${ev.held?'undo':'check'} mr-1"></i>${ev.held?'Отменить':'Проведено'}</button></div></div>`);}
function moveEvent(evId){const ev=DB.events.find(e=>e.id===evId);if(!ev)return;const sel=$('#moveRoomSelect');if(!sel)return;ev.roomId=+sel.value;ev.conflict=false;closeModal();refreshSchedule();toast('Занятие перенесено','success');}
function toggleHeld(evId){const ev=DB.events.find(e=>e.id===evId);if(!ev)return;ev.held=!ev.held;closeModal();refreshSchedule();toast(ev.held?'Отмечено':'Отметка снята','info');}
function handleFile(input,key){if(input.files.length){State.uploadedFiles[key]=input.files[0].name;refreshSchedule();toast('Файл загружен: '+input.files[0].name,'success')}}
function handleDrop(e,key){e.preventDefault();e.currentTarget.classList.remove('dragover');if(e.dataTransfer.files.length){State.uploadedFiles[key]=e.dataTransfer.files[0].name;refreshSchedule();toast('Файл загружен','success')}}
function runGeneration(){const ov=document.createElement('div');ov.className='gen-overlay';ov.id='genOverlay';ov.innerHTML=`<div class="gen-spinner"></div><div class="text-lg font-700">Генерация расписания</div><div class="text-sm text-gray-500" id="genStep">Анализ учебных планов...</div>`;document.body.appendChild(ov);const steps=['Анализ учебных планов...','Проверка ограничений...','Распределение по аудиториям...','Оптимизация нагрузки...','Финальная проверка...'];let i=0;const iv=setInterval(()=>{i++;const st=$('#genStep');if(st)st.textContent=steps[Math.min(i,steps.length-1)];if(i>=steps.length){clearInterval(iv);setTimeout(()=>{generateSchedule();const o=$('#genOverlay');if(o)o.remove();refreshSchedule();const gs=$('#genStatus');if(gs)gs.innerHTML='<span class="text-green-600 font-600"><i class="fas fa-check-circle mr-1"></i>Сгенерировано ('+DB.events.length+' занятий)</span>';toast('Расписание сгенерировано','success')},500)}},700);}

/* ========== АУДИТОРНЫЙ ФОНД ========== */
function renderRooms(){
  return `<div class="space-y-6">
    <div class="flex flex-col gap-4">
      <div class="flex gap-2 flex-wrap"><select class="input-field !w-full sm:!w-auto" style="padding:8px 14px;font-size:13px" id="roomBuildingFilter" onchange="filterRooms()"><option value="">Все корпуса</option>${DB.buildings.map(b=>`<option value="${b.id}">${b.name}</option>`).join('')}</select><select class="input-field !w-full sm:!w-auto" style="padding:8px 14px;font-size:13px" id="roomTypeFilter" onchange="filterRooms()"><option value="">Все типы</option><option value="lecture">Лекционные</option><option value="practice">Практические</option><option value="lab">Лаборатории</option><option value="computer">Комп. классы</option></select><input class="input-field !w-full sm:!w-48" style="padding:8px 14px;font-size:13px" placeholder="Поиск..." id="roomSearch" oninput="filterRooms()"></div>
      <div class="flex gap-2"><button class="btn-grad text-sm !px-4" onclick="showAddRoomModal()"><i class="fas fa-plus mr-1"></i>Добавить</button><button class="btn-outline text-sm !px-4" onclick="toast('Импорт аудиторий из файла','info')"><i class="fas fa-file-import mr-1"></i>Импорт</button></div>
    </div>
    <div class="card overflow-hidden fade-up"><div class="overflow-x-auto -mx-4 sm:mx-0"><table class="w-full text-sm min-w-[800px]"><thead><tr class="text-left text-gray-400 bg-gray-50 border-b border-gray-100"><th class="p-4 font-600 pl-4 sm:pl-4">Аудитория</th><th class="p-4 font-600">Корпус</th><th class="p-4 font-600">Этаж</th><th class="p-4 font-600">Вместимость</th><th class="p-4 font-600">Тип</th><th class="p-4 font-600">Оборудование</th><th class="p-4 font-600">Загрузка</th><th class="p-4 font-600 pr-4">Действия</th></tr></thead><tbody id="roomsTableBody">${buildRoomsRows(DB.rooms)}</tbody></table></div></div>
  </div>`;
}
function buildRoomsRows(rooms){return rooms.map(r=>{const b=getBuilding(r.buildingId);const events=DB.events.filter(e=>e.roomId===r.id);const load=Math.round((events.length/6)*100);return `<tr class="table-row border-b border-gray-50"><td class="p-4 font-700 pl-4 sm:pl-4">${r.name}</td><td class="p-4 text-gray-500">${b?.name||'—'}</td><td class="p-4">${r.floor}</td><td class="p-4">${r.capacity}</td><td class="p-4"><span class="status-badge ${r.type==='lecture'?'status-orange':r.type==='lab'?'status-red':'status-green'}">${r.type==='lecture'?'Лекционная':r.type==='practice'?'Практическая':r.type==='lab'?'Лаборатория':'Комп. класс'}</span></td><td class="p-4 text-gray-500 text-xs">${r.equipment.join(', ')}</td><td class="p-4"><div class="flex items-center gap-2"><div class="w-16 h-2 bg-gray-100 rounded-full overflow-hidden"><div class="h-full rounded-full" style="width:${load}%;background:${load<=40?'#22C55E':load<=70?'#F59E0B':'#EF4444'}"></div></div><span class="text-xs font-600">${load}%</span></div></td><td class="p-4 pr-4"><button onclick="showRoomDetail(${r.id})" class="text-primary hover:underline text-xs font-600">Детали</button></td></tr>`;}).join('');}
function filterRooms(){const bF=$('#roomBuildingFilter')?.value||'';const tF=$('#roomTypeFilter')?.value||'';const sF=($('#roomSearch')?.value||'').toLowerCase();let filtered=DB.rooms;if(bF)filtered=filtered.filter(r=>r.buildingId===+bF);if(tF)filtered=filtered.filter(r=>r.type===tF);if(sF)filtered=filtered.filter(r=>r.name.toLowerCase().includes(sF));const tb=$('#roomsTableBody');if(tb)tb.innerHTML=buildRoomsRows(filtered);}
function showAddRoomModal(){showModal(`<h3 class="text-lg font-800 mb-5">Добавить аудиторию</h3><div class="space-y-4"><div><label class="block text-sm font-600 mb-1">Название</label><input class="input-field" id="newRoomName" placeholder="Г-301"></div><div class="grid grid-cols-2 gap-4"><div><label class="block text-sm font-600 mb-1">Корпус</label><select class="input-field" id="newRoomBuilding">${DB.buildings.map(b=>`<option value="${b.id}">${b.name}</option>`).join('')}</select></div><div><label class="block text-sm font-600 mb-1">Этаж</label><input class="input-field" id="newRoomFloor" type="number" min="1" value="1"></div></div><div class="grid grid-cols-2 gap-4"><div><label class="block text-sm font-600 mb-1">Вместимость</label><input class="input-field" id="newRoomCap" type="number" min="1" value="30"></div><div><label class="block text-sm font-600 mb-1">Тип</label><select class="input-field" id="newRoomType"><option value="practice">Практическая</option><option value="lecture">Лекционная</option><option value="lab">Лаборатория</option><option value="computer">Комп. класс</option></select></div></div><button class="btn-grad w-full" onclick="addRoom()">Добавить</button></div>`);}
function addRoom(){const name=$('#newRoomName')?.value;const bid=+$('#newRoomBuilding')?.value;const floor=+$('#newRoomFloor')?.value;const cap=+$('#newRoomCap')?.value;const type=$('#newRoomType')?.value;if(!name){toast('Укажите название','error');return}DB.rooms.push({id:DB.rooms.length+1,name,buildingId:bid,floor,capacity:cap,type,equipment:[]});closeModal();navigate('/rooms');toast('Аудитория '+name+' добавлена','success');}

// ---------- 1. Центр уведомлений (in‑app notifications) ----------
const NotificationCenter = {
  storageKey: 'auditorium_notifications',
  list: [],
  init() {
    const saved = localStorage.getItem(this.storageKey);
    if (saved) try { this.list = JSON.parse(saved); } catch(e){}
  },
  save() {
    localStorage.setItem(this.storageKey, JSON.stringify(this.list));
  },
  add(type, title, message, link = null) {
    const notif = {
      id: Date.now() + Math.random(),
      type,        // 'info', 'warning', 'success', 'schedule_change'
      title,
      message,
      link,
      read: false,
      timestamp: new Date().toISOString()
    };
    this.list.unshift(notif);
    if (this.list.length > 50) this.list.pop();
    this.save();
    this.updateBadge();
  },
  markAsRead(id) {

const originalSubmitBooking = submitBooking;
submitBooking = function() {
  const room=+$('#bkRoom')?.value, date=$('#bkDate')?.value, slot=+$('#bkSlot')?.value, requester=$('#bkRequester')?.value, purpose=$('#bkPurpose')?.value;
  if(!requester||!purpose){toast('Заполните все поля','error');return}
  const recurring = $('#bkRecurring')?.checked;
  if (recurring) {
    const freq = parseInt($('#bkRepeatFreq')?.value) || 1;
    const until = $('#bkRepeatUntil')?.value;
    if (!until) { toast('Укажите дату окончания повторов','error'); return; }
    let currentDate = new Date(date);
    const endDate = new Date(until);
    let count = 0;
    while (currentDate <= endDate) {
      DB.bookings.push({
        id: DB.bookings.length + 1,
        roomId: room,
        date: currentDate.toISOString().slice(0,10),
        timeSlot: slot,
        purpose,
        status: 'pending',
        requester
      });
      count++;
      currentDate.setDate(currentDate.getDate() + freq * 7);
    }
    toast(`Создано ${count} повторяющихся заявок`, 'success');
  } else {
    DB.bookings.push({id:DB.bookings.length+1,roomId:room,date,timeSlot:slot,purpose,status:'pending',requester});
  }
  ActivityLog.log(`Новая заявка на бронирование`, `${recurring?'Повторяющаяся, ':''}${purpose}`);
  navigate('/bookings');
  toast('Заявка подана','success');
};

// ---------- 5. Экспорт расписания в PDF ----------
window.exportToPDF = function() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(16);
  doc.text('Расписание занятий', 14, 20);
  doc.setFontSize(10);
  let y = 30;
  const headers = ['Время', ...DAYS];
  const colWidths = [40, 28, 28, 28, 28, 28, 28];
  let x = 10;
  headers.forEach((h, i) => {
    doc.text(h, x, y);
    x += colWidths[i];
  });
  y += 6;
  doc.line(10, y, 190, y);
  y += 6;
  
  SLOTS.forEach(slot => {
    let rowX = 10;
    doc.text(slot.time, rowX, y);
    rowX += colWidths[0];
    DAYS.forEach((_, dayIdx) => {
      const ev = DB.events.find(e => e.day === dayIdx && e.slot === slot.id && 
        (State.scheduleFilter === 'group' ? e.groupId === State.scheduleFilterId : 
         State.scheduleFilter === 'teacher' ? e.teacherId === State.scheduleFilterId : 
         e.roomId === State.scheduleFilterId));
      if (ev) {
        const disc = getDisc(ev.disciplineId);
        const text = (disc?.name || '').substring(0, 12);
        doc.text(text, rowX, y);
      }
      rowX += colWidths[dayIdx+1];
    });
    y += 8;
    if (y > 270) { doc.addPage(); y = 20; }
  });
  
  doc.save('schedule.pdf');
  ActivityLog.log('Экспорт расписания в PDF');
  toast('PDF сохранён', 'success');
};

// ---------- 6. Drag & Drop для переноса занятий (упрощённо) ----------
// Добавляем атрибуты draggable на ячейки и обработчики
function attachDragDrop() {
  document.querySelectorAll('.schedule-cell').forEach(cell => {
    cell.setAttribute('draggable', 'true');
    cell.addEventListener('dragstart', e => {
      const evId = cell.dataset.eventId;
      if (evId) e.dataTransfer.setData('text/plain', evId);
    });
  });
  document.querySelectorAll('.schedule-cell').forEach(cell => {
    cell.addEventListener('dragover', e => e.preventDefault());
    cell.addEventListener('drop', e => {
      e.preventDefault();
      const targetCell = e.currentTarget;
      const targetDay = parseInt(targetCell.dataset.day);
      const targetSlot = parseInt(targetCell.dataset.slot);
      const sourceEvId = e.dataTransfer.getData('text/plain');
      if (!sourceEvId) return;
      const ev = DB.events.find(e => e.id == sourceEvId);
      if (ev) {
        // Простейшая проверка конфликта
        const conflict = DB.events.some(e => e.id !== ev.id && e.day === targetDay && e.slot === targetSlot &&
          (e.roomId === ev.roomId || e.teacherId === ev.teacherId || e.groupId === ev.groupId));
        if (conflict) { toast('Невозможно перенести: конфликт', 'error'); return; }
        ev.day = targetDay;
        ev.slot = targetSlot;
        refreshSchedule();
        ActivityLog.log(`Перенос занятия (drag&drop)`, `${getDisc(ev.disciplineId)?.name} → ${DAYS[targetDay]} ${SLOTS[targetSlot-1].time}`);
        NotificationCenter.add('info', 'Занятие перенесено', `${getDisc(ev.disciplineId)?.name} теперь ${DAYS[targetDay]} ${SLOTS[targetSlot-1].time}`);
        toast('Занятие перенесено', 'success');
      }
    });
  });
}

// В buildScheduleRows нужно добавить dataset в ячейки. Переопределим немного.
// Быстрое решение: после рендера вызовем attachDragDrop, но лучше переписать.
// Для сохранения объёма сделаем обёртку.
const superBuildRows = buildScheduleRows;
buildScheduleRows = function() {
  let html = '';
  SLOTS.forEach(sl => {
    const cells = DAYS.map((_, di) => {
      const ev = DB.events.find(e => {
        if(State.scheduleFilter==='group') return e.groupId===State.scheduleFilterId&&e.day===di&&e.slot===sl.id;
        if(State.scheduleFilter==='teacher') return e.teacherId===State.scheduleFilterId&&e.day===di&&e.slot===sl.id;
        return e.roomId===State.scheduleFilterId&&e.day===di&&e.slot===sl.id;
      });
      if(!ev) return `<td class="py-1 px-1"><div class="schedule-cell bg-gray-50 text-gray-300 text-center" data-day="${di}" data-slot="${sl.id}">—</div></td>`;
      const disc=getDisc(ev.disciplineId),grp=getGroup(ev.groupId),tch=getTeacher(ev.teacherId),rm=getRoom(ev.roomId);
      let info='';
      if(State.scheduleFilter==='group') info=`${rm?.name||''}<br><span class="text-gray-500">${tch?.name?.split(' ')[0]||''}</span>`;
      else if(State.scheduleFilter==='teacher') info=`${grp?.name||''}<br><span class="text-gray-500">${rm?.name||''}</span>`;
      else info=`${grp?.name||''}<br><span class="text-gray-500">${tch?.name?.split(' ')[0]||''}</span>`;
      return `<td class="py-1 px-1"><div class="schedule-cell ${TYPE_COLOR[ev.type]||''} ${ev.conflict?'conflict':''}" data-event-id="${ev.id}" data-day="${di}" data-slot="${sl.id}" onclick="openEventPanel(${ev.id})"><div class="font-600 text-xs leading-tight mb-0.5">${disc?.name||'—'}</div><div class="text-xs leading-tight opacity-80">${info}</div><div class="text-xs mt-1 opacity-60">${TYPE_MAP[ev.type]||''}</div>${ev.held?'<div class="text-xs text-green-600 mt-0.5"><i class="fas fa-check"></i> Проведено</div>':''}</div></td>`;
    }).join('');
    html += `<tr class="border-b border-gray-50"><td class="py-1 pr-3 font-600 text-xs text-gray-500 whitespace-nowrap align-top pt-3 pl-4 sm:pl-0">${sl.time}</td>${cells}</tr>`;
  });
  setTimeout(attachDragDrop, 30);
  return html;
};

window.saveTeacherPrefs = function(teacherId) {
  const modal = document.querySelector('.modal-box');
  const dayChecks = modal.querySelectorAll('input[value][type="checkbox"]:checked');
  const days = [], slots = [];
  dayChecks.forEach(cb => {
    const val = cb.value;
    if (DAYS[val]) days.push(parseInt(val));
    else if (SLOTS.find(s => s.id == val)) slots.push(parseInt(val));
  });
  TeacherPreferences.set(teacherId, { preferredDays: days, preferredSlots: slots });
  toast('Предпочтения сохранены', 'success');
  closeModal();
};

// ---------- 1. Модуль замен преподавателей ----------
const SubstitutionManager = {
  storageKey: 'substitutions',
  list: [],
  init() {
    const saved = localStorage.getItem(this.storageKey);
    if (saved) try { this.list = JSON.parse(saved); } catch(e){}
  },
  save() {
    localStorage.setItem(this.storageKey, JSON.stringify(this.list));
  },
  create(eventId, newTeacherId, reason = '') {
    const ev = DB.events.find(e => e.id === eventId);
    if (!ev) return null;
    const oldTeacherId = ev.teacherId;
    const sub = {
      id: Date.now(),
      eventId,
      oldTeacherId,
      newTeacherId,
      reason,
      date: new Date().toISOString(),
      status: 'active' // active, cancelled
    };
    this.list.push(sub);
    ev.teacherId = newTeacherId;
    ev.conflict = this.checkConflict(ev);
    this.save();
    ActivityLog.log(`Замена преподавателя`, `${getTeacher(oldTeacherId)?.name} → ${getTeacher(newTeacherId)?.name} на ${DAYS[ev.day]} ${SLOTS[ev.slot-1].time}`);
    NotificationCenter.add('warning', 'Замена преподавателя', `${getTeacher(newTeacherId)?.name} проведёт занятие вместо ${getTeacher(oldTeacherId)?.name}`, '#/schedule');
    return sub;
  },
  cancel(subId) {
    const sub = this.list.find(s => s.id === subId);
    if (!sub || sub.status === 'cancelled') return;
    const ev = DB.events.find(e => e.id === sub.eventId);
    if (ev) {
      ev.teacherId = sub.oldTeacherId;
      ev.conflict = this.checkConflict(ev);
    }
    sub.status = 'cancelled';
    this.save();
    ActivityLog.log(`Отмена замены`, `Возвращён ${getTeacher(sub.oldTeacherId)?.name}`);
    toast('Замена отменена', 'info');
  },
  checkConflict(ev) {
    return DB.events.some(e => e.id !== ev.id && e.day === ev.day && e.slot === ev.slot &&
      (e.roomId === ev.roomId || e.teacherId === ev.teacherId || e.groupId === ev.groupId));
  },
  getActiveSubstitutions() {
    return this.list.filter(s => s.status === 'active');
  },
  renderPanelForEvent(eventId) {
    const ev = DB.events.find(e => e.id === eventId);
    if (!ev) return '';
    const oldT = getTeacher(ev.teacherId);
    const availableTeachers = DB.teachers.filter(t => {
      if (t.id === ev.teacherId) return false;
      // проверка, свободен ли преподаватель в это время
      return !DB.events.some(e => e.teacherId === t.id && e.day === ev.day && e.slot === ev.slot);
    });
    const activeSub = this.list.find(s => s.eventId === eventId && s.status === 'active');
    return `
      <div class="mt-4 pt-3 border-t border-gray-100">
        <div class="flex items-center justify-between mb-2">
          <span class="font-600 text-sm">Замена преподавателя</span>
          ${activeSub ? `<span class="status-badge status-orange">Активна</span>` : ''}
        </div>
        ${activeSub ? `
          <div class="bg-orange-50 p-3 rounded-xl text-sm mb-3">
            <div class="flex items-center gap-2"><i class="fas fa-exchange-alt text-orange-500"></i> Замена: ${getTeacher(activeSub.newTeacherId)?.name}</div>
            <button class="text-xs text-red-500 mt-1" onclick="SubstitutionManager.cancel(${activeSub.id}); closeModal(); refreshSchedule();">Отменить замену</button>
          </div>
        ` : `
          <div class="space-y-2">
            <select class="input-field text-sm" id="subTeacherSelect">
              <option value="">Выберите преподавателя</option>
              ${availableTeachers.map(t => `<option value="${t.id}">${t.name}</option>`).join('')}
            </select>
            <input type="text" class="input-field text-sm" id="subReason" placeholder="Причина (необязательно)">
            <button class="btn-outline w-full text-sm" onclick="createSubstitution(${ev.id})">
              <i class="fas fa-user-plus mr-1"></i>Назначить замену
            </button>
          </div>
        `}
      </div>
    `;
  },
  renderAllSubstitutions() {
    const active = this.getActiveSubstitutions();
    return `
      <h3 class="text-lg font-800 mb-4">Активные замены</h3>
      ${active.length === 0 ? '<p class="text-gray-400 text-center py-8">Нет активных замен</p>' : `
        <div class="space-y-3">
          ${active.map(s => {
            const ev = DB.events.find(e => e.id === s.eventId);
            if (!ev) return '';
            const oldT = getTeacher(s.oldTeacherId);
            const newT = getTeacher(s.newTeacherId);
            const disc = getDisc(ev.disciplineId);
            const group = getGroup(ev.groupId);
            return `
              <div class="p-4 bg-orange-50 rounded-xl">
                <div class="flex justify-between items-start">
                  <div>
                    <div class="font-600">${disc?.name} (${group?.name})</div>
                    <div class="text-sm text-gray-600">${DAYS[ev.day]} ${SLOTS[ev.slot-1].time}</div>
                    <div class="text-sm mt-1"><span class="line-through text-gray-400">${oldT?.name}</span> → <span class="font-600 text-green-600">${newT?.name}</span></div>
                    ${s.reason ? `<div class="text-xs text-gray-500 mt-1">Причина: ${s.reason}</div>` : ''}
                  </div>
                  <button class="text-red-500 text-xs" onclick="SubstitutionManager.cancel(${s.id}); renderSubstitutionsPanel()">
                    <i class="fas fa-times"></i> Отменить
                  </button>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `}
      <h4 class="font-600 mt-6 mb-3">История замен</h4>
      <div class="text-sm text-gray-500 max-h-40 overflow-y-auto">
        ${this.list.filter(s => s.status === 'cancelled').slice(0,10).map(s => {
          const oldT = getTeacher(s.oldTeacherId);
          const newT = getTeacher(s.newTeacherId);
          return `<div class="py-1">${new Date(s.date).toLocaleDateString()}: ${oldT?.name} → ${newT?.name}</div>`;
        }).join('')}
      </div>
    `;
  }
};

// ---------- 2. Учёт посещаемости ----------
const AttendanceTracker = {
  storageKey: 'attendance',
  records: [],
  init() {
    const saved = localStorage.getItem(this.storageKey);
    if (saved) try { this.records = JSON.parse(saved); } catch(e){}
  },
  save() {
    localStorage.setItem(this.storageKey, JSON.stringify(this.records));
  },
  markAttendance(eventId, studentCount, presentCount, note = '') {
    const ev = DB.events.find(e => e.id === eventId);
    if (!ev) return;
    const record = {
      id: Date.now(),
      eventId,
      date: new Date().toISOString(),
      groupId: ev.groupId,
      teacherId: ev.teacherId,
      disciplineId: ev.disciplineId,
      studentCount,
      presentCount,
      note
    };
    this.records.push(record);
    this.save();
    ActivityLog.log(`Отметка посещаемости`, `${getGroup(ev.groupId)?.name}: ${presentCount}/${studentCount}`);
    toast(`Посещаемость сохранена: ${presentCount}/${studentCount}`, 'success');
  },
  getStatsByGroup(groupId) {
    const records = this.records.filter(r => r.groupId === groupId);
    if (records.length === 0) return { avg: 0, total: 0 };
    const total = records.reduce((sum, r) => sum + r.presentCount, 0);
    const totalStudents = records.reduce((sum, r) => sum + r.studentCount, 0);
    return { avg: totalStudents ? Math.round((total / totalStudents)*100) : 0, total };
  },
  renderAttendancePanel(eventId) {
    const ev = DB.events.find(e => e.id === eventId);
    if (!ev) return '';
    const group = getGroup(ev.groupId);
    const pastRecords = this.records.filter(r => r.eventId === eventId).slice(0,3);
    return `
      <div class="mt-4 pt-3 border-t border-gray-100">
        <div class="font-600 text-sm mb-2">Учёт посещаемости</div>
        <div class="bg-gray-50 p-3 rounded-xl space-y-2">
          <div class="flex items-center gap-2">
            <span class="text-sm">Присутствовало:</span>
            <input type="number" id="attPresent" class="input-field w-20 text-sm" min="0" max="${group?.students||30}" value="${group?.students||30}">
            <span class="text-sm text-gray-400">/ ${group?.students||30}</span>
          </div>
          <input type="text" id="attNote" class="input-field text-sm" placeholder="Примечание (опционально)">
          <button class="btn-grad w-full text-sm" onclick="submitAttendance(${eventId}, ${group?.students||30})">Сохранить</button>
        </div>
        ${pastRecords.length > 0 ? `
          <div class="mt-2 text-xs text-gray-500">
            <div>Предыдущие отметки:</div>
            ${pastRecords.map(r => `<div>${new Date(r.date).toLocaleDateString()}: ${r.presentCount}/${r.studentCount}</div>`).join('')}
          </div>
        ` : ''}
      </div>
    `;
  }
};
AttendanceTracker.init();

window.submitAttendance = function(eventId, maxStudents) {

// ---------- 3. Расширенная аналитика: тепловая карта недели и прогноз ----------
function renderWeeklyHeatmap() {
  const totalSlots = 36; // 6 дней * 6 пар
  const loadBySlot = Array(6).fill(0).map(() => Array(6).fill(0));
  DB.events.forEach(ev => {
    if (ev.day < 6 && ev.slot <= 6) loadBySlot[ev.day][ev.slot-1]++;
  });
  const maxLoad = Math.max(...loadBySlot.flat());
  return `
    <div class="card p-5 sm:p-6 fade-up mt-6">
      <h3 class="text-lg font-700 mb-4">Тепловая карта загрузки по дням и парам</h3>
      <div class="overflow-x-auto">
        <table class="w-full text-xs">
          <thead><tr><th class="p-1"></th>${DAYS.map(d => `<th class="p-1 text-center">${d}</th>`).join('')}</tr></thead>
          <tbody>
            ${SLOTS.map((slot, idx) => `
              <tr><td class="p-1 font-600 text-gray-500">${slot.time}</td>
              ${DAYS.map((_, day) => {
                const val = loadBySlot[day][idx];
                const intensity = maxLoad ? val / maxLoad : 0;
                const bg = `rgba(37, 99, 235, ${intensity * 0.8 + 0.2})`;
                return `<td class="p-1"><div class="w-full h-8 rounded flex items-center justify-center font-600 text-white" style="background:${bg}">${val || ''}</div></td>`;
              }).join('')}
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      <p class="text-xs text-gray-400 mt-3">Интенсивность цвета — относительная загрузка</p>
    </div>
  `;
}

// Прогноз загрузки на основе истории (простая скользящая средняя)
function renderForecast() {
  // Здесь эмулируем прогноз
  return `
    <div class="card p-5 sm:p-6 fade-up mt-6">
      <h3 class="text-lg font-700 mb-4">Прогноз загрузки на следующую неделю</h3>

          const maxH = 120;
          return `<div class="flex-1 flex flex-col items-center"><div class="w-full bg-primary/20 rounded-t-lg" style="height:${forecast/maxH*100}%; background: #2563EB;"></div><div class="text-xs mt-1 font-600">${d}</div><div class="text-xs text-gray-500">${forecast} пар</div></div>`;
        }).join('')}

}

const ThemeManager = {

  init() {
    const saved = localStorage.getItem(this.storageKey);

    this.apply();
  },
  toggle() {
    this.current = this.current === 'light' ? 'dark' : 'light';
    this.apply();
    localStorage.setItem(this.storageKey, this.current);
  },
  apply() {
    const root = document.documentElement;
    if (this.current === 'dark') {
      root.style.setProperty('--bg-color', '#0F172A');
      root.style.setProperty('--card-bg', '#1E293B');
      root.style.setProperty('--text-primary', '#F1F5F9');
      root.style.setProperty('--text-secondary', '#94A3B8');

      document.body.classList.add('dark');

      root.style.setProperty('--card-bg', '#FFFFFF');
      root.style.setProperty('--text-primary', '#1E293B');
      root.style.setProperty('--text-secondary', '#64748B');

// ---------- 2. Глобальный поиск ----------
window.globalSearch = function(query) {
  const resultsDiv = $('#globalSearchResults');
  if (!resultsDiv) return;
  if (!query || query.length < 2) {
    resultsDiv.classList.add('hidden');
    return;
  }
  const q = query.toLowerCase();
  const results = [];
  
  // Поиск по аудиториям
  DB.rooms.filter(r => r.name.toLowerCase().includes(q) || getBuilding(r.buildingId)?.name.toLowerCase().includes(q))
    .slice(0,3).forEach(r => results.push({type:'room', icon:'fa-door-open', title:r.name, desc:`${getBuilding(r.buildingId)?.name}, ${r.capacity} мест`, action:`navigate('/rooms');setTimeout(()=>showRoomDetail(${r.id}),100)`}));
  
  // Поиск по преподавателям
  DB.teachers.filter(t => t.name.toLowerCase().includes(q) || t.dept.toLowerCase().includes(q))
    .slice(0,3).forEach(t => results.push({type:'teacher', icon:'fa-user', title:t.name, desc:t.dept, action:`navigate('/people');setTimeout(()=>showTeacherDetail(${t.id}),100)`}));
  
  // Поиск по группам
  DB.groups.filter(g => g.name.toLowerCase().includes(q))
    .slice(0,3).forEach(g => results.push({type:'group', icon:'fa-users', title:g.name, desc:`${g.course} курс, ${g.students} студентов`, action:`State.scheduleFilter='group';State.scheduleFilterId=${g.id};navigate('/schedule')`}));
  
  // Поиск по дисциплинам
  DB.disciplines.filter(d => d.name.toLowerCase().includes(q))
    .slice(0,3).forEach(d => results.push({type:'discipline', icon:'fa-book', title:d.name, desc:`${TYPE_MAP[d.type]||d.type}, ${d.hours} ч.`, action:`toast('Дисциплина: ${d.name}','info')`}));
  
  if (results.length === 0) {
    resultsDiv.innerHTML = '<div class="p-4 text-center text-gray-400">Ничего не найдено</div>';
  } else {
    resultsDiv.innerHTML = results.map(r => `
      <div class="p-3 hover:bg-gray-50 dark:hover:bg-gray-700 cursor-pointer flex items-start gap-3 border-b border-gray-100 dark:border-gray-700 last:border-0" onclick="${r.action};closeSearchResults()">
        <div class="w-8 h-8 rounded-lg bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-primary"><i class="fas ${r.icon}"></i></div>
        <div><div class="font-600 text-sm">${r.title}</div><div class="text-xs text-gray-500">${r.desc}</div></div>
      </div>
    `).join('');
  }
  resultsDiv.classList.remove('hidden');
};

  $('#globalSearchResults')?.classList.add('hidden');
  $('#globalSearchInput').value = '';
};

// ---------- 3. Система рейтинга и отзывов ----------
const RatingSystem = {
  storageKey: 'ratings',
  data: [],
  init() {
    const saved = localStorage.getItem(this.storageKey);
    if (saved) try { this.data = JSON.parse(saved); } catch(e){}
  },
  save() {
    localStorage.setItem(this.storageKey, JSON.stringify(this.data));
  },
  addRating(eventId, teacherId, disciplineId, rating, comment = '') {
    const ev = DB.events.find(e => e.id === eventId);
    if (!ev) return;
    const record = {
      id: Date.now(),
      eventId,
      teacherId,
      disciplineId,
      groupId: ev.groupId,
      rating, // 1-5
      comment,
      date: new Date().toISOString()
    };
    this.data.push(record);
    this.save();
    ActivityLog.log(`Оценка занятия`, `${getTeacher(teacherId)?.name}: ${rating}/5`);
    toast('Спасибо за отзыв!', 'success');
  },
  getTeacherRating(teacherId) {
    const ratings = this.data.filter(r => r.teacherId === teacherId);
    if (ratings.length === 0) return { avg: 0, count: 0 };
    const sum = ratings.reduce((acc, r) => acc + r.rating, 0);
    return { avg: (sum / ratings.length).toFixed(1), count: ratings.length };
  },
  renderRatingPanel(eventId) {
    const ev = DB.events.find(e => e.id === eventId);
    if (!ev) return '';
    const existing = this.data.find(r => r.eventId === eventId);
    if (existing) {
      return `
        <div class="mt-4 pt-3 border-t border-gray-100">
          <div class="font-600 text-sm mb-1">Оценка занятия</div>
          <div class="flex items-center gap-2">
            <div class="flex">${[1,2,3,4,5].map(i => `<i class="fas fa-star ${i<=existing.rating?'text-yellow-500':'text-gray-300'}"></i>`).join('')}</div>
            <span class="text-sm text-gray-500">${existing.comment || 'Без комментария'}</span>
          </div>
        </div>
      `;
    }
    return `
      <div class="mt-4 pt-3 border-t border-gray-100">
        <div class="font-600 text-sm mb-2">Оцените занятие</div>
        <div class="flex gap-1 mb-2" id="ratingStars">
          ${[1,2,3,4,5].map(i => `<i class="far fa-star text-2xl cursor-pointer hover:text-yellow-500" onclick="setRating(${i})"></i>`).join('')}
        </div>
        <input type="text" id="ratingComment" class="input-field text-sm" placeholder="Комментарий (необязательно)">
        <input type="hidden" id="selectedRating" value="5">
        <button class="btn-grad w-full text-sm mt-2" onclick="submitRating(${ev.id}, ${ev.teacherId}, ${ev.disciplineId})">Отправить оценку</button>
      </div>
    `;
  }
};
RatingSystem.init();

window.setRating = function(val) {
  $('#selectedRating').value = val;
  const stars = $('#ratingStars').children;
  for (let i=0; i<5; i++) {
    stars[i].className = i < val ? 'fas fa-star text-yellow-500 text-2xl cursor-pointer' : 'far fa-star text-2xl cursor-pointer';
  }

window.submitRating = function(eventId, teacherId, disciplineId) {
  const rating = parseInt($('#selectedRating').value || 5);

  RatingSystem.addRating(eventId, teacherId, disciplineId, rating, comment);

// ---------- 5. Анализ конфликтов и рекомендации ----------
function analyzeConflicts() {
  const conflicts = DB.events.filter(e => e.conflict);
  const suggestions = [];
  conflicts.forEach(ev => {
    const conflicting = DB.events.filter(e => e.day === ev.day && e.slot === ev.slot && e.id !== ev.id);
    conflicting.forEach(cf => {
      if (cf.roomId === ev.roomId) suggestions.push(`Конфликт аудитории: ${getRoom(ev.roomId)?.name} занята одновременно событиями #${ev.id} и #${cf.id}. Предлагаем перенести одно из занятий.`);
      if (cf.teacherId === ev.teacherId) suggestions.push(`Преподаватель ${getTeacher(ev.teacherId)?.name} ведёт два занятия в одно время. Рассмотрите замену.`);
      if (cf.groupId === ev.groupId) suggestions.push(`Группа ${getGroup(ev.groupId)?.name} имеет две пары одновременно.`);
    });
  });
  return { count: conflicts.length, suggestions: [...new Set(suggestions)] };
}

window.showConflictAnalysis = function() {
  const analysis = analyzeConflicts();
  showModal(`
    <h3 class="text-lg font-800 mb-4">Анализ конфликтов</h3>
    <p class="mb-3">Найдено конфликтов: <span class="font-700 ${analysis.count?'text-red-500':'text-green-600'}">${analysis.count}</span></p>
    ${analysis.suggestions.length > 0 ? `
      <div class="space-y-2 max-h-80 overflow-y-auto">
        ${analysis.suggestions.map(s => `<div class="p-3 bg-red-50 dark:bg-red-900/20 rounded-lg text-sm"><i class="fas fa-exclamation-triangle text-red-500 mr-2"></i>${s}</div>`).join('')}
      </div>
    ` : '<p class="text-green-600">Конфликтов не обнаружено.</p>'}
    <button class="btn-grad w-full mt-4" onclick="autoResolveConflicts()">Автоматически устранить</button>
  `);
};

window.autoResolveConflicts = function() {
  const conflicts = DB.events.filter(e => e.conflict);
  conflicts.forEach(ev => {
    // Простейшая логика: ищем свободный слот в тот же день
    for (let slot = 1; slot <= 6; slot++) {
      if (slot === ev.slot) continue;
      const conflict = DB.events.some(e => e.day === ev.day && e.slot === slot && (e.roomId === ev.roomId || e.teacherId === ev.teacherId || e.groupId === ev.groupId));
      if (!conflict) {
        ev.slot = slot;
        ev.conflict = false;
        break;
      }
    }
  });
  closeModal();
  refreshSchedule();
  toast('Конфликты автоматически устранены', 'success');
  ActivityLog.log('Автоматическое устранение конфликтов', `Исправлено ${conflicts.length} конфликтов`);
};

const ReminderSystem = {
  checkInterval: null,
  start() {
    if (this.checkInterval) return;
    this.checkInterval = setInterval(() => this.checkUpcoming(), 60000); // каждую минуту
    this.checkUpcoming(); // сразу
  },
  checkUpcoming() {
    if (!("Notification" in window)) return;
    if (Notification.permission !== "granted") return;
    
    const now = new Date();
    const currentDay = (now.getDay() + 6) % 7; // Пн=0
    const currentHour = now.getHours();
    const currentMinute = now.getMinutes();
    
    DB.events.forEach(ev => {
      if (ev.day !== currentDay) return;
      const slot = SLOTS[ev.slot-1];
      if (!slot) return;
      const [startTime] = slot.time.split(' — ');
      const [hour, minute] = startTime.split(':').map(Number);
      const timeDiff = (hour * 60 + minute) - (currentHour * 60 + currentMinute);
      
      if (timeDiff > 0 && timeDiff <= 15) {
        const disc = getDisc(ev.disciplineId);
        const room = getRoom(ev.roomId);
        new Notification(`Скоро занятие: ${disc?.name}`, {
          body: `Начало в ${startTime}, аудитория ${room?.name}`,
          icon: 'https://cdn-icons-png.flaticon.com/512/2942/2942936.png'
        });
      }
    });
  },
  requestPermission() {
    if ("Notification" in window) {
      Notification.requestPermission();
    }
  }
};

// ---------- 7. Анализ загруженности преподавателей с предупреждениями ----------
function analyzeTeacherLoad() {
  const overloaded = [];
  DB.teachers.forEach(t => {
    const hours = DB.events.filter(e => e.teacherId === t.id).length * 2;
    const loadPercent = (hours / t.maxHours) * 100;
    if (loadPercent > 90) overloaded.push({teacher: t, hours, max: t.maxHours, percent: loadPercent});
  });
  return overloaded;
}

function renderTeacherLoadWidget() {
  const overloaded = analyzeTeacherLoad();
  if (overloaded.length === 0) return '<div class="card p-5"><p class="text-green-600">✅ Все преподаватели в пределах нормы</p></div>';
  return `
    <div class="card p-5">
      <h3 class="font-700 mb-3 text-orange-500">⚠️ Перегрузка преподавателей</h3>
      <div class="space-y-2">
        ${overloaded.map(o => `
          <div class="p-3 bg-orange-50 dark:bg-orange-900/20 rounded-lg">
            <div class="font-600">${o.teacher.name}</div>
            <div class="text-sm">${o.hours} / ${o.max} ч (${Math.round(o.percent)}%)</div>
            <div class="w-full h-2 bg-gray-200 rounded-full mt-1"><div class="h-full bg-orange-500 rounded-full" style="width:${o.percent}%"></div></div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// Вставляем в дашборд или аналитику
const analyticsWithLoad = renderAnalytics;
renderAnalytics = function() {
  let html = analyticsWithLoad.call(this);
  html += renderTeacherLoadWidget();
  return html;
};

const VideoConference = {
  providers: ['zoom', 'teams', 'google', 'yandex'],
  settings: {
    defaultProvider: 'zoom',
    zoomAccount: 'university@zoom.us',
    teamsDomain: 'university.onmicrosoft.com'
  },
  generateLink(eventId, provider = null) {
    const ev = DB.events.find(e => e.id === eventId);
    if (!ev) return null;
    const prov = provider || this.settings.defaultProvider;
    const disc = getDisc(ev.disciplineId);
    const group = getGroup(ev.groupId);
    const teacher = getTeacher(ev.teacherId);
    const meetingId = `aud-${ev.id}-${Date.now().toString(36)}`;
    switch(prov) {
      case 'zoom': return `https://zoom.us/j/${Math.floor(Math.random()*10000000000)}?pwd=${Math.random().toString(36).substr(2,8)}`;
      case 'teams': return `https://teams.microsoft.com/l/meetup-join/19:meeting_${meetingId}@thread.v2`;
      case 'google': return `https://meet.google.com/${meetingId}`;
      case 'yandex': return `https://telemost.yandex.ru/j/${meetingId}`;
      default: return '#';
    }
  },
  renderPanel(eventId) {
    const ev = DB.events.find(e => e.id === eventId);
    if (!ev) return '';
    const existingLink = ev.conferenceLink;
    return `
      <div class="mt-4 pt-3 border-t border-gray-100">
        <div class="font-600 text-sm mb-2">Видеоконференция</div>
        ${existingLink ? `
          <div class="bg-blue-50 p-3 rounded-xl">
            <div class="flex items-center gap-2"><i class="fas fa-video text-blue-500"></i><span class="text-sm">Ссылка активна</span></div>
            <div class="flex gap-2 mt-2">
              <input class="input-field flex-1 text-xs" value="${existingLink}" readonly>
              <button class="btn-outline text-xs" onclick="copyToClipboard('${existingLink}')"><i class="fas fa-copy"></i></button>
            </div>
            <button class="text-xs text-blue-500 mt-1" onclick="window.open('${existingLink}','_blank')">Присоединиться <i class="fas fa-external-link-alt"></i></button>
          </div>
        ` : `
          <select class="input-field text-sm mb-2" id="confProvider">
            ${this.providers.map(p => `<option value="${p}">${p.charAt(0).toUpperCase()+p.slice(1)}</option>`).join('')}
          </select>
          <button class="btn-grad w-full text-sm" onclick="generateConfLink(${ev.id})"><i class="fas fa-link mr-1"></i>Создать конференцию</button>
        `}
      </div>
    `;
  }
};

window.generateConfLink = function(eventId) {
  const provider = $('#confProvider')?.value;
  const link = VideoConference.generateLink(eventId, provider);
  const ev = DB.events.find(e => e.id === eventId);
  if (ev) {
    ev.conferenceLink = link;
    ActivityLog.log('Создана видеоконференция', `${provider} для события #${eventId}`);
    toast('Ссылка на конференцию создана', 'success');
  }
  closeModal();
  refreshSchedule();
};
